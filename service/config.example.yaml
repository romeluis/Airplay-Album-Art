# Copy to config.yaml (git-ignored) and adjust. See ../design.md.

server:
  host: 0.0.0.0
  port: 8765

discovery:
  # true: monitor every HomePod found on the network.
  # false: only the devices listed below.
  auto: true

cache:
  # On-disk artwork cache (~8 KB per album); replayed tracks resolve instantly.
  enabled: true
  # dir: ~/Library/Caches/airplay-art
  max_mb: 1024

# Used when discovery.auto is false, or to attach pairing credentials.
# Find identifiers with: uv run atvremote scan
homepods:
  - name: Living Room
    identifier: "AA:BB:CC:DD:EE:FF"
    # credentials: ""   # from `uv run atvremote --id <ID> --protocol airplay pair`
  - name: Bedroom
    identifier: "11:22:33:44:55:66"
