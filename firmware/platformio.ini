; AirPlay Album Art display firmware — see ../design.md for the full system design.
;
; env:tft-preview  — interim Adafruit ESP32-S3 Reverse TFT Feather (letterboxed
;                    64x64 preview on the built-in 240x135 ST7789).
; env:hub75-p3     — 64x64 P3 HUB75E matrix on the Feather headers.
; env:hub75-p3-s3-devkit — 64x64 P3 HUB75E matrix + INMP441 + mode button on
;                          a generic ESP32-S3 dev board.

[env:tft-preview]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino
monitor_speed = 115200
build_flags =
    -DOUTPUT_TFT_PREVIEW
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.4
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.2

[env:hub75-p3]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino
monitor_speed = 115200
build_flags =
    -DOUTPUT_HUB75
    -DHUB75_PINMAP_FEATHER
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.15
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.2

[env:hub75-p3-s3-devkit]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DOUTPUT_HUB75
    -DHUB75_PINMAP_S3_DEVKIT
    -DAUDIO_REACTIVE
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.15
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.2
