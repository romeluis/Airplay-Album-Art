; AirPlay Album Art display firmware — see ../design.md for the full system design.
;
; Production target: ESP32-S3-DevKitC-1 driving a 64x64 P3 HUB75E matrix,
; with an INMP441 I2S microphone and a mode button.

[platformio]
default_envs = hub75-p3-s3-devkit

[env:hub75-p3-s3-devkit]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DOUTPUT_HUB75
    -DAUDIO_REACTIVE
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.15
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.4.2
